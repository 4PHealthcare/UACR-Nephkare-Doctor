<div class="flex flex-col">
  <form
    class="flex-auto px-6"
    [formGroup]="familyHistoryForm" 
    #familyHistoryNGForm="ngForm"
    
  >
    <div class="grid sm:grid-cols-4 gap-6 w-full mt-8">
      <div class="sm:col-span-2 form-group">
        <mat-form-field
          class="fuse-mat-no-subscript w-full"
          floatLabel="always"
        >
          <mat-label>Relationship <span>*</span></mat-label>
          <mat-select
            [placeholder]="'Select'"
            [formControlName]="'relationship'"
            (selectionChange)="clearSelectedProblem()"
          >
            <mat-option [value]="data.masterdata_id" *ngFor="let data of relationShips">{{data.data_name}}</mat-option>
          </mat-select>
        </mat-form-field>
        <div
          *ngIf="f.relationship.touched && f.relationship.invalid"
          class="alert alert-danger"
        >
          <div
            *ngIf="f.relationship.errors && f.relationship.errors.required"
          >
          Relationship is required.
          </div>
        </div>
      </div>
      <div class="sm:col-span-4 form-group" *ngIf="familyHistoryForm.controls.relationship.value">
        <mat-label>Problem/Condition <span>*</span></mat-label>
        <br />
        <div class="grid sm:grid-cols-1 gap-4 w-full">
          <section class="example-section">
            <mat-checkbox
              class="example-margin"
              [color]="'primary'"
             
              *ngFor="let problem of problems;let mainInd='index'" 
              [checked] = "problem.checked"
              (change)="selectedSymptom(problem, $event, familyHistoryForm.controls.relationship.value,mainInd)"
            >
              {{ problem.data_name }}
            </mat-checkbox>
          </section>
        </div>
      </div>
     
      <!-- <div class="sm:col-span-4 form-group">
        <mat-form-field
          class="fuse-mat-no-subscript w-full"
          floatLabel="always"
        >
          <mat-label>Notes</mat-label>
          <input matInput [formControlName]="'note'" [placeholder]="'Enter'" />
        </mat-form-field>
      </div> -->
    </div>
    <!-- Divider -->
    <div class="mt-11 mb-10 border-t"></div>
    <!-- Actions -->
    <div class="flex items-center justify-end">
      <button mat-flat-button type="button" (click)="onReset()" class="border-solid border-primary-500 text-primary-500 mr-2"  [disabled]="familyHistoryForm.invalid || selectedProblems.length == 0">
        <span class="ml-2 mr-1" >Clear</span>
      </button>
      <button
        type="submit"
        mat-flat-button
        [color]="'primary'"
        [disabled]="familyHistoryForm.invalid || selectedProblems.length == 0"
      
        (click)="onSubmit();familyHistoryNGForm.resetForm()"
      >
        <span class="ml-2 mr-1">{{familyhistory_id?'Update':'Save'}}</span>
        <mat-progress-spinner
        *ngIf="isLoadingSpinner"
         [diameter]="24"
         [mode]="'indeterminate'"></mat-progress-spinner>
      </button>
    </div>
  </form>
</div>
