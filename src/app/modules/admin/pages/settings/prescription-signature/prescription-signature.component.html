<div 
    class="clinic-profile sm:absolute sm:inset-0 flex flex-col flex-auto min-w-0 sm:overflow-hidden bg-card dark:bg-transparent"
  >
  <div class="clinic-profile-tab">
    <div class="content lg:ml-0 sm:ml-10 md:ml-10">
        <form>
            <div class="grid sm:grid-cols-4 gap-6 w-full mt-8 px-12">
              <div class="sm:col-span-4">
                <div class="absolute mt-2.5">Signature Upload:</div>
               
                <div class="delete-trash" >
                  <button [disabled]="!digitalSignature" (click)="deleteDigitalSign()" 
                  mat-stroked-button
                  [matTooltip]="'delete'"
                      class="min-w-10 min-h-7 h-7 px-2 "
                    >
                  <mat-icon class="transform-0-8" svgIcon="heroicons_outline:trash" size="small"></mat-icon>
                </button>
                </div>
                <div class="mt-2 ">
                  
                  <label
                    class="no-border hoverable header-size"
                    for="fileInput"
                  >
                  <img class="border-0" [src]="digitalSignature ? digitalSignature : 'assets/images/avatars/white-bg.png'" />
        
                    <div class="background"></div>
                    <!-- <div>
                        <mat-label
                        >i.e: width:800px, Height: 144px; File
                        Size: 50kb</mat-label
                      >
                    </div> -->
                    <div
                          class="flex justify-center"
                        >
                          <div class="absolute"></div>
                          <div
                            class="bg-gy mt-2 py-0.5 px-3 rounded-full text-sm font-semibold text-pink-800 bg-gray-100 dark:text-pink-50 dark:bg-gray-500 ng-star-inserted"
                          >
                            Update Image
                          </div>
                          <div class="flex items-center"></div>
                        </div>
                   
                  </label>
        
                  <br />
                  <input
                    id="fileInput"
                    type="file"
                    (change)="onSelectFileDigital($event)"
                  />
                </div>
              </div>
            
            </div>
            <!-- <div class="flex items-center justify-end mt-10 px-12">
              <button
                class="ml-4"
                mat-flat-button
                type="button"
                [color]="'primary'"
                (click)="saveHeaderFooter()"
              >
                
                {{headerId || footerId ? 'Update':'Save'}}
              </button>
            </div> -->
          </form>
      </div>
  </div>
  
 
  </div>
