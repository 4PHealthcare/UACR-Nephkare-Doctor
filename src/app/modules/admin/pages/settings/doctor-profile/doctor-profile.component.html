<div
  class="sm:absolute sm:inset-0 flex flex-col flex-auto min-w-0 sm:overflow-hidden bg-card dark:bg-transparent"
>
 
  <div class="relative flex pt-9 px-6 md:px-4">
  
    <div
      class="text-4xl font-extrabold tracking-tight lg:ml-0 sm:ml-10 md:ml-10"
    >
      User Management
    </div>
  </div>

  <div>
     <div
          class="px-6 relative flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between py-8 border-b"
        >
          
          <mat-form-field
            class="fuse-mat-dense fuse-mat-no-subscript fuse-mat-rounded w-3/5"
          >
            <mat-icon
              class="icon-size-5"
              matPrefix
              [svgIcon]="'heroicons_solid:search'"
            ></mat-icon>
            <input
              matInput
              (input)="filterStaffData($event.target.value)"
              [autocomplete]="'off'"
              [placeholder]="'Search for User Name, Phone Number, Email'"
            />
          </mat-form-field>
          
          <div class="flex flex-shrink-0 items-center mt-6 sm:mt-0 sm:ml-4">
           

            <button
              class="ml-4"
              mat-flat-button
              [color]="'primary'"
              (click)="openAddStaff()"
            >
              <mat-icon [svgIcon]="'heroicons_solid:plus-circle'"></mat-icon>
              <span class="ml-2 mr-1">Add Health Worker</span>
            </button>
          </div>
        </div>

       
        <div class="flex flex-auto overflow-hidden">
         
          <div
            class="flex flex-col flex-auto sm:mb-18 sm:overflow-y-auto grid-calc"
          >
            <ng-container *ngIf="staffList$ | async; else noDoctors">
              <div class="grid">
                
                <div
                  class="inventory-grid doctor-profile-grid z-10 sticky top-0 grid gap-4 py-4 px-6 md:px-4 shadow text-md font-semibold text-secondary bg-gray-50 dark:bg-black dark:bg-opacity-5"
                  matSort
                  (matSortChange)="sortData($event)"
                >
                  <div
                    class="hidden md:block items-center"
                    [mat-sort-header]="'full_name'"
                  >
                    User Info
                  </div>
                  <div
                    class="hidden md:block items-center"
                    [mat-sort-header]="'mobile_no'"
                  >
                    Phone Number
                  </div>
                  <div
                    class="hidden md:block items-center"
                    [mat-sort-header]="'email_address'"
                  >
                    Email
                  </div>
                  <div
                    class="hidden md:block items-center"
                    [mat-sort-header]="'created_on'"
                  >
                    Created On
                  </div>
                  <div class="hidden lg:block items-center">Actions</div>
                </div>

                <ng-container *ngIf="staffList$ | async as doctors">
                  <ng-container
                    *ngFor="let data of doctors; trackBy: trackByFn"
                  >
                    <div
                      class="inventory-grid doctor-profile-grid grid items-center gap-4 py-3 px-6 md:px-4 border-b"
                    >
                      
                      <div>
                        <span class="font-semibold">{{ data?.fullname }}</span
                        ><br />
                        
                      </div>
                      
                      <div>{{ data?.country_code }} {{data.mobile}}</div>

                      
                      <div>
                        <div>{{ data?.email }}</div>
                      </div>

                      <div>
                        <div>{{ data?.created_on | date: "MMM d, y" }}</div>
                      </div>

                      
                      <div class="flex">
                       
                        <div class="pr-2">
                          <button
                            class="min-w-10 min-h-7 h-7 px-2 leading-6"
                            mat-stroked-button
                            (click)="openAddStaff(data)"
                          >
                            <mat-icon
                              class="icon-size-5"
                              [matTooltip]="'Edit'"
                              [svgIcon]="'heroicons_solid:pencil-alt'"
                            >
                            </mat-icon>
                          </button>
                        </div>

                        <div class="pr-2">
                          <button
                            class="min-w-10 min-h-7 h-7 px-2 leading-6"
                            mat-stroked-button
                            (click)="deleteSelectedDoctor(data, 'staff')"
                          >
                            <mat-icon
                              class="icon-size-5"
                              [matTooltip]="'Delete'"
                              [svgIcon]="'heroicons_solid:trash'"
                            >
                            </mat-icon>
                          </button>
                        </div>
                      </div>
                    </div>
                    <div class="grid">
                      <ng-container *ngIf="selectedProduct?.id === data.id">
                        <ng-container
                          *ngTemplateOutlet="
                            rowDetailsTemplate;
                            context: { $implicit: data }
                          "
                        >
                        </ng-container>
                      </ng-container>
                    </div>
                  </ng-container>
                </ng-container>
              </div>

            
            </ng-container>

            <ng-template #noDoctors>
              <div
                class="p-8 sm:p-16 border-t text-4xl font-semibold tracking-tight text-center"
              >
                There are no users!
              </div>
            </ng-template>
          </div>
        </div>
  </div>
