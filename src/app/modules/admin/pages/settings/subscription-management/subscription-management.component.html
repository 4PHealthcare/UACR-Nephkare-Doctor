  <div 
    class="clinic-profile sm:absolute sm:inset-0 flex flex-col flex-auto min-w-0 sm:overflow-hidden bg-card dark:bg-transparent"
  >
    <div class="relative flex pt-9 px-6 md:px-8">
      <div class="text-4xl font-extrabold tracking-tight lg:ml-0 sm:ml-10 md:ml-10">Subscription Management</div>
    </div>
    <div class="flex flex-auto p-6 sm:p-10">
      <div class="flex flex-col flex-auto w-full max-w-xs sm:max-w-5xl mx-auto">
        <!-- Filters -->
        <div class="
            flex flex-col
            sm:flex-row
            items-center
            w-full
            max-w-xs
            sm:max-w-none
          ">
          <mat-form-field class="fuse-mat-no-subscript w-full sm:w-96">
            <mat-select [(ngModel)]="selectedServiceCategory" (selectionChange)="getServicesList()">
              <ng-container *ngFor="let service of serviceList$ | async; trackBy: trackByFn">
                <mat-option [value]="service.masterdata_id" >
                  {{ service.data_name }}
                </mat-option>
              </ng-container>
            
            </mat-select>
          </mat-form-field>
          <mat-form-field class="fuse-mat-no-subscript w-full sm:w-96 mt-4 sm:mt-0 sm:ml-4" [floatLabel]="'always'">
            <mat-icon matPrefix class="icon-size-5" [svgIcon]="'heroicons_solid:search'"></mat-icon>
            <input [(ngModel)]="searchService" placeholder="Search for Service Name" matInput #query />
          </mat-form-field>
          <!-- <button class="ml-4" mat-flat-button [color]="'primary'" (click)="addNewService()">
            <mat-icon [svgIcon]="'heroicons_outline:plus'"></mat-icon>
            <span class="ml-2 mr-1">Add New Service</span>
          </button> -->
        </div>
        <!-- Courses -->
          <div class="
              grid grid-cols-1
              sm:grid-cols-2
              lg:grid-cols-4
              gap-8
              mt-8
              sm:mt-10
            ">
            <div class="
                flex flex-col
                items-center
                justify-center
                rounded-lg
                cursor-pointer
                border-2 border-gray-300 border-dashed
                hover:bg-hover
                transition-colors
                duration-150
                ease-in-out
              "  style="height: 20rem" (click)="addNewService()">
              <mat-icon class="icon-size-12 text-hint" [svgIcon]="'heroicons_outline:plus'"></mat-icon>
              <div class="mt-4 text-2xl text-blue-800 font-medium">
                Add New Service
              </div>
            </div>
            <ng-container >
            <ng-container *ngFor="let data of subsriptionsList | searchSubscription : searchService">
              <!-- Course -->
              <div class="
                  flex flex-col
                  h-80
                  border-2
                  rounded-2xl
                  overflow-hidden
                  bg-card
                ">
                <div class="flex flex-col p-6">
                  <div class="flex items-center justify-between">
                    <div
                      class="py-0.5 px-3 rounded-full text-sm font-semibold text-blue-800 bg-blue-100 dark:text-blue-50 dark:bg-blue-500">
                      {{ data.planname }}</div>
                    <div class="flex items-center">
                      <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
                        <mat-icon>more_vert</mat-icon>
                      </button>
                      <mat-menu #menu="matMenu">
                        <button mat-menu-item (click)="editService(data)">
                          <mat-icon>edit</mat-icon>
                          <span>Edit</span>
                        </button>
                        <button mat-menu-item (click)="deleteService(data)">
                          <mat-icon>delete</mat-icon>
                          <span>Delete</span>
                        </button>
                      </mat-menu>
                    </div>
                  </div>
                  <!-- Course title & description -->
                  <div class="mt-4 text-lg font-medium">{{ data.title }}</div>
                  <div class="mt-0.5 line-clamp-2 text-secondary">
                    {{ data.description }}
                  </div>
                  <div class="w-12 h-1 my-6 border-t-2"></div>
                  <!-- Course time -->
                  <div class="flex items-center leading-5 text-md text-secondary">
                    <mat-icon class="icon-size-5 text-hint" [svgIcon]="'heroicons_solid:clock'"></mat-icon>
                    <div class="ml-1.5" *ngIf="data.duration_in_months != 0">{{ data.duration_in_months }} {{ data.duration_in_months === 1 ? 'Month' : 'Months'}}</div>
                    <div class="ml-1.5" *ngIf="data.duration_in_months == 0">One Time</div>
                  </div>
  
                  <div class="
                      flex
                      mt-2
                      items-center
                      leading-5
                      text-md text-secondary
                    ">
                    <mat-icon class="icon-size-5 text-hint" [svgIcon]="'heroicons_solid:currency-rupee'"></mat-icon>
                    <div class="ml-1.5">{{ data.price }}</div>
                  </div>
                </div>
                <!-- Footer -->
                <div class="flex flex-col w-full mt-auto">
                  <!-- Course progress -->
  
                  <!-- Course launch button -->
                  <!-- <div class="px-6 py-4 text-right bg-gray-50 dark:bg-transparent">
                    <button mat-stroked-button [routerLink]="'/apps/tasks'" [queryParams]="{ id: data.subscription_id }" class="hover:text-blue-800 w-full">
                      <span class="inline-flex items-center">
                        
                        <ng-container *ngIf="data.offer_count != 0; else noOffer">
                          <span class="font-semibold text-blue-800 mr-1">{{data.offer_count}}</span>
                          <span>Offers linked</span>
                        </ng-container>
                        <ng-template #noOffer>
                          <span class="font-semibold text-blue-800 mr-1">Add Offer</span>
                        </ng-template>
                      </span>
                    </button>
                  </div> -->
                </div>
              </div>
            </ng-container>
            </ng-container>
          </div>
        <!-- No courses -->
        <ng-template #noServices>
          <div class="
              flex flex-auto flex-col
              items-center
              justify-center
              bg-gray-100
              dark:bg-transparent
            ">
            <mat-icon class="icon-size-20" [svgIcon]="'iconsmind:file_search'"></mat-icon>
            <div class="mt-6 text-2xl font-semibold tracking-tight text-secondary">
              No services found!
            </div>
          </div>
        </ng-template>
      </div>
    </div>
    
   
  </div>
