<div class="flex flex-col w-full overflow-auto bg-card">
    <div
      class="flex flex-row items-center px-6 h-20 min-h-20 text-white bg-primary"
    >
      
      <div class="ml-3 text-2xl font-semibold tracking-tight">Add Symptoms</div>
      <button class="ml-auto" mat-icon-button (click)="dialogRef.close()">
        <mat-icon
          class="text-current"
          [svgIcon]="'heroicons_outline:x'"
        ></mat-icon>
      </button>
    </div>
    <div
      class="flex-auto px-6 pt-9 pb-12 md:p-8 md:pb-12 lg:pl-12 lg:pr-12 lg:pt-3"

    >
      <div class="grid sm:grid-cols-4 gap-6 w-full mt-8">
        <!-- Name -->
        <div class="sm:col-span-4 form-group">
            <mat-form-field class="example-chip-list w-full lab-radiology" floatLabel="always" appearance="fill">
                <mat-label>Symptoms<span>*</span></mat-label>

                <mat-chip-list #chipList2 aria-label="Select">
                  <mat-chip
                    *ngFor="let lab of observations | isActivePipe"
                    (removed)="removeObservation(lab)"
                  >
                    {{ lab.complaint_name }}
                    <button matChipRemove>
                      <mat-icon>cancel</mat-icon>
                    </button>
                  </mat-chip>
                  <input
                    placeholder="Enter"
                    #observationsInput
                    [formControl]="observationCtrl"
                    [matAutocomplete]="auto2"
                    [matChipInputFor]="chipList2"
                    [matChipInputAddOnBlur]="false"
                    (blur)="addOnBlur($event)"
                    (matChipInputTokenEnd)="addObservation($event)"
                    [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
                    (input)="searchObservationsTerm($event)"
                    (focus)="recentObservation()"
                    #trigger="matAutocompleteTrigger" 
                    (click)="selectionMade($event, trigger)"
                  />
                </mat-chip-list>
                <mat-autocomplete
                  #auto2="matAutocomplete"
                  (optionSelected)="selectedObervation($event)"
                >
                  <mat-option
                  *ngFor="let option of filteredObervationsOptions$ | async"
                  [id]="option.name"
                  [value]="option.name"
                  >
                    {{ option.name }}
                  </mat-option>
                </mat-autocomplete> 
              </mat-form-field>
              <div *ngIf="observations.length == 0">
                <div *ngIf="observationCtrl.touched && observationCtrl.invalid"
                class="alert alert-danger">
                
                 <div *ngIf="observationCtrl.errors && observationCtrl.errors.required">Symptoms is required.</div>
               </div>
                </div>
        </div>

          <mat-form-field
            class="fuse-mat-no-subscript w-full"
            floatLabel="always"
          >
            <mat-label>Onset Date</mat-label>

            <input matInput [placeholder]="'Enter'" [(ngModel)]="durationValue" />

              <mat-option [value]="data.masterdata_id" *ngFor="let data of durations">{{data.data_name}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div> -->
      </div>
     
  
      <!-- Divider -->
      <div class="mt-11 mb-10 border-t"></div>
      <!-- Actions -->
      <div class="flex items-center justify-end">
        <button mat-flat-button type="button" [disabled]="observationCtrl.pristine" (click)="clear()" class="border-solid border-primary-500 text-primary-500 mr-2" >
          <span class="ml-2 mr-1">{{ observations.length == 0 ? 'Clear' : 'Cancel'}}</span>
        </button>
       
        <button
          type="submit"
          mat-flat-button
          [color]="'primary'"
          [disabled]="observations.length == 0 || isLoadingSpinner"
        (click)="save()"
        >
          <span class="ml-2 mr-1">{{ observations.length == 0 ? 'Save' : 'Update'}}</span>
          <mat-progress-spinner
              *ngIf="isLoadingSpinner"
               [diameter]="24"
               [mode]="'indeterminate'"></mat-progress-spinner>


        </button>
      </div>
    </div>
  </div>
